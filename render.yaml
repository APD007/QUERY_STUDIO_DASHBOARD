services:
  - type: web
    name: query-studio
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: JWT_SECRET
        sync: false # set this in the Render dashboard — keeps it out of git and out of build logs
      - key: DATABASE_URL
        sync: false # Postgres connection string — set in the Render dashboard once you've provisioned a Postgres instance (Render's own, Neon, Supabase, etc.)
